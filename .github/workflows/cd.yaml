---
name: Continuous Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  DOCKER_IMAGE_TAG: ${{ github.ref_name }}
  PULUMI_STACK_NAME: prod
  APPS_DEPLOYMENT_REPO: SylvainMarty/apps-deployment
  ARGOCD_APP_PROJECT: sff-vektor

jobs:
  pulumi-up:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: infra/.nvmrc
          package-manager-cache: false
      - run: npm install
        working-directory: ./infra
      - uses: pulumi/actions@8e5e406f4007fca908480587cb9893c07090f58d # v7.0.0
        with:
          command: up
          stack-name: ${{ env.PULUMI_STACK_NAME }}
          work-dir: infra/
          comment-on-summary: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-api:
    needs: [pulumi-up]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      API_IMAGE_NAME: ${{ github.repository }}/sff-vektor-api
    outputs:
      api_docker_image_name: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}
      api_docker_image_sha256: ${{ steps.build-and-push-api.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 #v3.5.0
        with:
          cosign-release: "v2.2.4"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata for API
        id: meta-api
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.DOCKER_IMAGE_TAG }}
      - name: Build and push Docker image for API
        id: build-and-push-api
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          target: api
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Sign the published Docker image for API
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta-api.outputs.tags }}
          DIGEST: ${{ steps.build-and-push-api.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  build-scheduler:
    needs: [pulumi-up]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      SCHEDULER_IMAGE_NAME: ${{ github.repository }}/sff-vektor-scheduler
    outputs:
      scheduler_docker_image_name: ${{ env.REGISTRY }}/${{ env.SCHEDULER_IMAGE_NAME }}
      scheduler_docker_image_sha256: ${{ steps.build-and-push-scheduler.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 #v3.5.0
        with:
          cosign-release: "v2.2.4"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata for scheduler
        id: meta-scheduler
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.SCHEDULER_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.DOCKER_IMAGE_TAG }}
      - name: Build and push Docker image for scheduler
        id: build-and-push-scheduler
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          target: scheduler
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-scheduler.outputs.tags }}
          labels: ${{ steps.meta-scheduler.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Sign the published Docker image for scheduler
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta-scheduler.outputs.tags }}
          DIGEST: ${{ steps.build-and-push-scheduler.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  build-frontend:
    needs: [pulumi-up]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      FRONTEND_IMAGE_NAME: ${{ github.repository }}/sff-vektor-frontend
    outputs:
      frontend_docker_image_name: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
      frontend_docker_image_sha256: ${{ steps.build-and-push-frontend.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Get Pulumi Stack outputs
        uses: pulumi/actions@8e5e406f4007fca908480587cb9893c07090f58d # v7.0.0
        id: pulumi-stack
        with:
          command: output
          stack-name: ${{ env.PULUMI_STACK_NAME }}
          work-dir: infra/
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 #v3.5.0
        with:
          cosign-release: "v2.2.4"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.DOCKER_IMAGE_TAG }}
      - name: Build and push Docker image for frontend
        id: build-and-push-frontend
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.pulumi-stack.outputs.apiEndpoint }}/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Sign the published Docker image for frontend
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta-frontend.outputs.tags }}
          DIGEST: ${{ steps.build-and-push-frontend.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  argocd-sync:
    needs: [build-api, build-scheduler, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out apps-deployment repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.APPS_DEPLOYMENT_REPO }}
          ref: master
          token: ${{ secrets.APPS_DEPLOYMENT_REPO_TOKEN }}
      - name: Git user setup
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
      - name: Env setup (lowercase)
        env:
          API_IMAGE_NAME_RAW: ${{ needs.build-api.outputs.api_docker_image_name }}
          API_FULL_IMAGE_RAW: "${{ needs.build-api.outputs.api_docker_image_name }}@${{ needs.build-api.outputs.api_docker_image_sha256 }}"
          SCHEDULER_IMAGE_NAME_RAW: ${{ needs.build-scheduler.outputs.scheduler_docker_image_name }}
          SCHEDULER_FULL_IMAGE_RAW: "${{ needs.build-scheduler.outputs.scheduler_docker_image_name }}@${{ needs.build-scheduler.outputs.scheduler_docker_image_sha256 }}"
          FRONTEND_IMAGE_NAME_RAW: ${{ needs.build-frontend.outputs.frontend_docker_image_name }}
          FRONTEND_FULL_IMAGE_RAW: "${{ needs.build-frontend.outputs.frontend_docker_image_name }}@${{ needs.build-frontend.outputs.frontend_docker_image_sha256 }}"
        run: |
          echo "API_IMAGE_NAME=${API_IMAGE_NAME_RAW,,}" >> "${GITHUB_ENV}"
          echo "API_FULL_IMAGE=${API_FULL_IMAGE_RAW,,}" >> "${GITHUB_ENV}"
          echo "SCHEDULER_IMAGE_NAME=${SCHEDULER_IMAGE_NAME_RAW,,}" >> "${GITHUB_ENV}"
          echo "SCHEDULER_FULL_IMAGE=${SCHEDULER_FULL_IMAGE_RAW,,}" >> "${GITHUB_ENV}"
          echo "FRONTEND_IMAGE_NAME=${FRONTEND_IMAGE_NAME_RAW,,}" >> "${GITHUB_ENV}"
          echo "FRONTEND_FULL_IMAGE=${FRONTEND_FULL_IMAGE_RAW,,}" >> "${GITHUB_ENV}"
      - name: Update api image
        env:
          IMAGE_NAME: ${{ env.API_IMAGE_NAME }}
          FULL_IMAGE: "${{ env.API_FULL_IMAGE }}"
          DEPLOYMENT_FILE: sff-vektor/api-deployment.yaml
        run: |
          sed -i "s|image: ${IMAGE_NAME}.*|image: ${FULL_IMAGE}|g" "${DEPLOYMENT_FILE}"
          git add "${DEPLOYMENT_FILE}"
          (git commit -m "deploy: sff-vektor api image (${FULL_IMAGE})" && git push) || true
      - name: Update scheduler image
        env:
          IMAGE_NAME: ${{ env.SCHEDULER_IMAGE_NAME }}
          FULL_IMAGE: "${{ env.SCHEDULER_FULL_IMAGE }}"
          DEPLOYMENT_FILE: sff-vektor/scheduler-cronjob.yaml
        run: |
          sed -i "s|image: ${IMAGE_NAME}.*|image: ${FULL_IMAGE}|g" "${DEPLOYMENT_FILE}"
          git add "${DEPLOYMENT_FILE}"
          (git commit -m "deploy: sff-vektor scheduler image (${FULL_IMAGE})" && git push) || true
      - name: Update frontend image
        env:
          IMAGE_NAME: ${{ env.FRONTEND_IMAGE_NAME }}
          FULL_IMAGE: "${{ env.FRONTEND_FULL_IMAGE }}"
          DEPLOYMENT_FILE: sff-vektor/frontend-deployment.yaml
        run: |
          sed -i "s|image: ${IMAGE_NAME}.*|image: ${FULL_IMAGE}|g" "${DEPLOYMENT_FILE}"
          git add "${DEPLOYMENT_FILE}"
          (git commit -m "deploy: sff-vektor frontend image (${FULL_IMAGE})" && git push) || true
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/
      - name: Login to ArgoCD
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --username ${{ secrets.ARGOCD_USERNAME }} \
            --password ${{ secrets.ARGOCD_PASSWORD }}
      - name: Sync ArgoCD Application
        run: |
          argocd app sync --project ${{ env.ARGOCD_APP_PROJECT }}
